name: Build TENDL Arrow Data

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tendl_release:
        description: "TENDL release version"
        required: true
        default: "2023"
        type: choice
        options:
          - "2023"
          - "2025"

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake gfortran

      - name: Build NJOY2016
        run: |
          git clone https://github.com/njoy/NJOY2016.git
          cd NJOY2016
          mkdir build && cd build
          cmake -DCMAKE_BUILD_TYPE=Release ..
          make -j$(nproc)
          sudo cp njoy /usr/local/bin/
          njoy --version || true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install "nuclear_data_to_yamc_format>=0.1.1"
          pip install --extra-index-url https://shimwell.github.io/wheels openmc

      - name: Determine TENDL release
        id: release
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ inputs.tendl_release }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=2023" >> "$GITHUB_OUTPUT"
          fi

      - name: Convert TENDL to Arrow format
        run: |
          convert-tendl --release ${{ steps.release.outputs.version }} --nuclides Fe56 --cleanup

      - name: Compress Arrow files
        run: |
          RELEASE=${{ steps.release.outputs.version }}
          tar -czf "tendl-${RELEASE}-arrow.tar.gz" "tendl-${RELEASE}-arrow/"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: tendl-${{ steps.release.outputs.version }}-arrow
          path: tendl-${{ steps.release.outputs.version }}-arrow.tar.gz

      - name: Upload to release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RELEASE=${{ steps.release.outputs.version }}
          gh release upload "${{ github.event.release.tag_name }}" \
            "tendl-${RELEASE}-arrow.tar.gz" \
            --clobber
